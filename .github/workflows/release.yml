name: GitHub Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: Release version (e.g. 0.2.0)
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Resolve version
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            VERSION="${{ github.event.release.tag_name }}"
            VERSION="${VERSION#v}"
          else
            VERSION="${{ github.event.inputs.version }}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Release version: $VERSION"

      - name: Build
        shell: pwsh
        run: ./publish/Publish-GitHubRelease.ps1 -Version ${{ steps.version.outputs.version }} -OutputDir ./artifacts

      - name: Upload release assets
        if: github.event_name == 'release'
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" ./artifacts/* --clobber

      - name: Upload workflow artifacts
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: everything-mcp-${{ steps.version.outputs.version }}
          path: artifacts/*
